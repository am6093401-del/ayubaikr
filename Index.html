<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>A.A. Ayubaikr - Solar System</title>
  <script src="https://sdk.minepi.com/pi-sdk.js"></script>
  <style>
    body { font-family: Arial, sans-serif; background: linear-gradient(135deg, #0f0c29, #302b63, #24243e); color: white; margin: 0; padding: 0; }
    .container { max-width: 600px; margin: 100px auto; padding: 30px; background: rgba(0,0,0,0.7); border-radius: 15px; text-align: center; }
    input, button { padding: 12px; margin: 10px; width: 80%; border-radius: 8px; }
    button { background: #ffd700; color: black; font-weight: bold; border: none; cursor: pointer; }
    button:hover { background: #ffcc00; }
    .dashboard { display: none; }
  </style>
</head>
<body>
  <div class="container" id="loginPage">
    <h1>A.A. Ayubaikr</h1>
    <h2>Solar System with Gold</h2>
    <p>Secure Login with Pi paid with pi</p>
    <button onclick="loginWithPi()">Login with Pi paid with pi</button>
  </div>

  <!-- Admin Dashboard -->
  <div class="container dashboard" id="dashboard">
    <h1>Admin Dashboard - A.A. Ayubaikr</h1>
    <p>Welcome, <span id="username"></span>!</p>
    
    <h3>Employee Solar Management (Gold / Test Pi)</h3>
    <input type="text" id="empAddress" placeholder="Employee Pi Wallet Address">
    <input type="number" id="amount" placeholder="Amount in Gold / Test Pi" value="50">
    <button onclick="sendSolar()">Send Solar (Testnet)</button>
    
    <hr>
    <h3>Recent Transactions</h3>
    <ul id="txList"></ul>
    
    <button onclick="logout()">Logout</button>
  </div>

  <script>
    let currentUser = null;

    // Initialize Pi SDK
    async function initPi() {
      try {
        await Pi.init({
          version: "2.0",
          sandbox: true  // Testnet mode
        });
      } catch (e) {
        console.error("Pi SDK Init Error", e);
      }
    }

    // Login with Pi
    async function loginWithPi() {
      try {
        const scopes = ['username', 'payments'];
        const user = await Pi.authenticate(scopes, async (auth) => {
          console.log("Authenticated:", auth);
          return auth;
        });
        
        currentUser = user;
        document.getElementById('loginPage').style.display = 'none';
        document.getElementById('dashboard').style.display = 'block';
        document.getElementById('username').textContent = user.username || "Admin";
        
        alert("Login successful! Welcome to A.A. Ayubaikr Admin Panel.");
      } catch (err) {
        console.error(err);
        alert("Login failed. Please try again in Pi Browser.");
      }
    }

    // Send Solar Payment (App-to-User on Testnet)
    async function sendSolar() {
      if (!currentUser) return alert("Please login first");

      const recipient = document.getElementById('empAddress').value.trim();
      const amount = parseFloat(document.getElementById('amount').value);

      if (!recipient || !amount) {
        return alert("Please enter wallet address and amount");
      }

      try {
        const payment = await Pi.createPayment({
          amount: amount,
          memo: `Solar Payment - A.A. Ayubaikr Gold`,
          metadata: {
            app: "A.A. Ayubaikr Solar System",
            type: "solar"
          }
        });

        // In real backend you would complete the payment here
        alert(`Payment initiated: ${amount} Test Pi / Gold to ${recipient}`);
        
        // Simulate transaction log
        const txList = document.getElementById('txList');
        const li = document.createElement('li');
        li.textContent = `${new Date().toLocaleTimeString()} - Sent ${amount} to ${recipient}`;
        txList.appendChild(li);
      } catch (err) {
        console.error(err);
        alert("Payment failed: " + err.message);
      }
    }

    function logout() {
      document.getElementById('dashboard').style.display = 'none';
      document.getElementById('loginPage').style.display = 'block';
      currentUser = null;
    }

    // Initialize on load
    window.onload = initPi;
  </script>
</body>
</html>
